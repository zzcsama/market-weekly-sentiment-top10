<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0a08" />
    <title>一周市场情绪 Top 10</title>
    <link rel="stylesheet" href="styles.css?v=20260511-logo-premium" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Weekly Market Sentiment</p>
          <h1>一周市场情绪 Top 10</h1>
        </div>
        <div class="period" id="period">加载中</div>
      </header>

      <section class="control-row" aria-label="市场切换">
        <button class="market-tab active" type="button" data-market="cn">A 股热评</button>
        <button class="market-tab" type="button" data-market="us">美股热评</button>
      </section>

      <section class="hero-band">
        <div>
          <p class="market-label" id="marketLabel">一周 A 股热评</p>
          <h2 id="marketTitle">本周市场情绪 Top 10</h2>
        </div>
        <div class="source-box">
          <span>数据源</span>
          <strong id="sourceText">公开市场数据</strong>
        </div>
      </section>

      <section class="stats-grid" aria-label="榜单概览">
        <div class="stat">
          <span>上榜数量</span>
          <strong id="countStat">10</strong>
        </div>
        <div class="stat">
          <span>最高情绪分</span>
          <strong id="scoreStat">--</strong>
        </div>
        <div class="stat">
          <span>更新状态</span>
          <strong id="updateStat">--</strong>
        </div>
      </section>

      <section class="leaderboard" id="leaderboard" aria-label="情绪榜单"></section>

      <footer class="footer">
        <span id="generatedAt">生成时间 --</span>
        <span id="disclaimer">本榜单仅用于观察市场情绪，不构成投资建议。</span>
      </footer>
    </main>

    <script src="app.js?v=20260511-logo-premium"></script>
  </body>
</html>
