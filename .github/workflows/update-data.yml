name: Update and Publish Weekly Market Sentiment

on:
  schedule:
    - cron: "0 2 * * 6"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: market-sentiment-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
      PUBLIC_PAGE_URL: https://zzcsama.github.io/market-weekly-sentiment-top10/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pandas akshare

      - name: Install Node dependencies
        run: npm install

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Update data
        run: npm run update:data
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash

      - name: Commit updated data
        run: |
          if [ -n "$(git status --porcelain data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/sentiment.json data/snapshots
            git commit -m "Update weekly market sentiment data"
            git push
          else
            echo "No data changes"
          fi

      - name: Capture pages
        run: npm run capture:all

      - name: Publish Telegram
        run: npm run publish:telegram

      - name: Remove install files
        run: rm -rf node_modules

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        uses: actions/deploy-pages@v4
